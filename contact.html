<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — travelX</title>
  <meta name="description" content="Submit your booking inquiry to travelX.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="container nav-container">
      <a href="index.html" class="logo">TRVL<span>X</span></a>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="details.html">Details</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <h1 style="text-align: center;">Secure a residency</h1>
      <div class="box" style="max-width: 600px; margin: 20px auto 0 auto;">
        <form id="inquiry-form" onsubmit="handleInquirySubmit(event)">
          <label for="inq-name">Name</label>
          <input type="text" id="inq-name" placeholder="Adrian Carter" required>

          <label for="inq-email">Email</label>
          <input type="email" id="inq-email" placeholder="adrian@domain.com" required>

          <label for="inq-dest">Destination</label>
          <select id="inq-dest">
            <option value="Sigiriya Citadel">Sigiriya Citadel</option>
            <option value="Dalada Maliga">Dalada Maliga</option>
            <option value="Mirissa Coast">Mirissa Coast</option>
          </select>

          <label for="inq-days">Duration (Days)</label>
          <input type="number" id="inq-days" value="3" min="1">

          <label for="inq-notes">Notes</label>
          <textarea id="inq-notes" rows="3" placeholder="Special requirements..."></textarea>

          <button type="submit" class="btn accent" style="width: 100%;">Send Request</button>
        </form>
      </div>
    </div>
  </section>

  <dialog id="success-modal">
    <h3>Inquiry Received</h3>
    <p id="modal-msg">Thank you. Your inquiry has been sent.</p>
    <button class="btn" onclick="closeSuccessModal()">Close</button>
  </dialog>

  <footer>
    <div class="container">
      <p>&copy; 2026 TRVLX Ltd.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
